name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      formula_version: ${{ steps.meta.outputs.formula_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        name: Compute version tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
            SHOULD_RELEASE=true
          else
            if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
              echo "error: releases may only be published from main; current ref is ${GITHUB_REF}" >&2
              exit 1
            fi

            VERSION_TAG="$(tr -d '[:space:]' < VERSION)"
            SHOULD_RELEASE=false
          fi

          if [[ -z "${VERSION_TAG}" ]]; then
            echo "error: VERSION must not be empty" >&2
            exit 1
          fi

          if [[ ! "${VERSION_TAG}" =~ ^v[0-9]+\.[0-9]{6}\.[0-9]+$ ]]; then
            echo "error: VERSION must match v{major}.{YYMMDD}.{ID}; got ${VERSION_TAG}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || grep -qiw 'release' <<<"${COMMIT_MESSAGE}"; then
              SHOULD_RELEASE=true
            fi
          else
            TAG_COMMIT="$(git rev-list -n1 "${VERSION_TAG}")"
            if [[ "${TAG_COMMIT}" != "${GITHUB_SHA}" ]]; then
              echo "error: pushed tag ${VERSION_TAG} points to ${TAG_COMMIT}, not ${GITHUB_SHA}" >&2
              exit 1
            fi
          fi

          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "formula_version=${VERSION_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create or verify release tag
        if: steps.meta.outputs.should_release == 'true' && github.ref_type != 'tag'
        shell: bash
        env:
          VERSION_TAG: ${{ steps.meta.outputs.version_tag }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          if git rev-parse -q --verify "refs/tags/${VERSION_TAG}" >/dev/null; then
            TAG_COMMIT="$(git rev-list -n1 "${VERSION_TAG}")"
            if [[ "${TAG_COMMIT}" != "${GITHUB_SHA}" ]]; then
              echo "error: ${VERSION_TAG} already exists for ${TAG_COMMIT}, not ${GITHUB_SHA}" >&2
              exit 1
            fi

            echo "Tag ${VERSION_TAG} already exists for this commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION_TAG}" -m "release: ${VERSION_TAG}"
          git push origin "refs/tags/${VERSION_TAG}"

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          ARCHIVE="pdf-to-typst-${VERSION_TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/pdf-to-typst" "${ARCHIVE}/"
          cp -r tools/ "${ARCHIVE}/tools/"
          cp README.md LICENSE "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  homebrew_tap:
    name: Update Homebrew Tap
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true' && secrets.HOMEBREW_TAP_TOKEN != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version_tag }}

      - name: Check tap token
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "error: HOMEBREW_TAP_TOKEN secret is required to update channprj/homebrew-tap" >&2
            exit 1
          fi

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: channprj/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formulas and README
        shell: bash
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          FORMULA_VERSION: ${{ needs.prepare.outputs.formula_version }}
        run: |
          set -euo pipefail

          TARBALL="/tmp/pdf-to-typst-${VERSION_TAG}.tar.gz"
          curl -L "https://github.com/channprj/pdf-to-typst/archive/refs/tags/${VERSION_TAG}.tar.gz" -o "${TARBALL}"
          SHA256="$(sha256sum "${TARBALL}" | awk '{print $1}')"

          python3 tools/generate_homebrew_formula.py \
            --version-tag "${VERSION_TAG}" \
            --sha256 "${SHA256}" \
            --out-dir homebrew-tap/Formula

          {
            printf '%s\n' '# homebrew-tap'
            printf '%s\n' ''
            printf '%s\n' 'Homebrew tap. Written by chann.'
            printf '%s\n' ''
            printf '%s\n' '## Install'
            printf '%s\n' ''
            printf '%s\n' '```bash'
            printf '%s\n' 'brew install channprj/tap/pdf-to-typst'
            printf '%s\n' "brew install channprj/tap/pdf-to-typst@${FORMULA_VERSION}"
            printf '%s\n' 'brew install channprj/tap/kmsg'
            printf '%s\n' '```'
          } > homebrew-tap/README.md

      - name: Commit and push tap updates
        shell: bash
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          FORMULA_VERSION: ${{ needs.prepare.outputs.formula_version }}
        run: |
          set -euo pipefail

          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add README.md "Formula/pdf-to-typst.rb" "Formula/pdf-to-typst@${FORMULA_VERSION}.rb"

          if git -C homebrew-tap diff --cached --quiet; then
            echo "No tap updates required."
            exit 0
          fi

          git -C homebrew-tap commit -m "chore(formula): bump pdf-to-typst to ${VERSION_TAG}"
          git -C homebrew-tap push origin HEAD:main

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare.outputs.version_tag }}
          tag_name: ${{ needs.prepare.outputs.version_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
