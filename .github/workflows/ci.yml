name: CI

on:
  push:
    branches: [main, "feat-*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-macos:
    name: macOS (primary)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Install runtime dependencies
        run: brew install ghostscript tesseract typst

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  check-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Install runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y ghostscript tesseract-ocr

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
